name: "Lock Threads"

on:
  schedule:
    - cron: "0 4 * * 0" # every Sunday at 04:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  discussions: write

concurrency:
  group: lock-threads

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v6
        with:
          issue-inactive-days: "7"
          discussion-inactive-days: "7"
          pr-inactive-days: "1"
